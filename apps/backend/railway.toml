[build]
builder = "railpack"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @shaxmatchi/backend build"

[deploy]
preDeployCommand = ["pnpm --filter @shaxmatchi/backend db:migrate"]
startCommand = "pnpm --filter @shaxmatchi/backend start"
healthcheckPath = "/health"
healthcheckTimeout = 100
